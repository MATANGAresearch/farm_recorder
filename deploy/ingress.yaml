apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: farm-recorder-ingress
  namespace: farmrecorder
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/client-max-body-size: "50m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  tls:
  - hosts:
    - farmrecorder.matangaresearch.com
    secretName: farm-recorder-tls
  rules:
  - host: farmrecorder.matangaresearch.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
      - path: /q
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: keycloak-service
            port:
              number: 8080
      - path: /farm-media
        pathType: Prefix
        backend:
          service:
            name: minio-service
            port:
              number: 9000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
