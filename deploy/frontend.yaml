apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: farmrecorder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: farmrecorder/frontend:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: farmrecorder
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: frontend
