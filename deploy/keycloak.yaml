apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: farmrecorder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:24.0.2
        args: ["start-dev"]
        env:
        - name: KEYCLOAK_ADMIN
          value: admin
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: admin
        - name: KC_DB
          value: postgres
        - name: KC_DB_URL
          value: jdbc:postgresql://postgres-service:5432/farmrecorder
        - name: KC_DB_USERNAME
          value: farmuser
        - name: KC_DB_PASSWORD
          value: farmpass
        - name: KC_PROXY
          value: edge
        - name: KC_HTTP_RELATIVE_PATH
          value: /auth
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_HOSTNAME_STRICT_HTTPS
          value: "false"
        ports:
        - containerPort: 8080
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: farmrecorder
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: keycloak
