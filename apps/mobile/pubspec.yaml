name: farm_recorder_mobile
description: GAP-certified farm activity recorder mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  geolocator: ^14.0.3
  image_picker: ^1.0.7
  image: ^4.1.7
  connectivity_plus: ^7.1.1
  uuid: ^4.5.3
  permission_handler: ^12.0.3
  shared_preferences: ^2.5.3
  record: ^6.2.1
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13
  openapi_generator: ^6.1.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
