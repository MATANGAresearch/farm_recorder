# Server Configuration
quarkus.http.port=8082

# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=farmuser
quarkus.datasource.password=farmpass
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/farmrecorder

# Liquibase
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Farm Recorder API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API for GAP-certified farm activity recording and EPCIS traceability
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Panache
quarkus.hibernate-orm.database.generation=validate

# Amazon S3 (MinIO)
quarkus.s3.endpoint-override=http://localhost:9000
quarkus.s3.aws.region=us-east-1
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=minioadmin
quarkus.s3.aws.credentials.static-provider.secret-access-key=minioadmin
quarkus.s3.path-style-access=true

# OIDC Authentication (Firebase Auth)
farmrecorder.firebase.project-id=farm-recorder-saas
quarkus.oidc.auth-server-url=https://securetoken.google.com/${farmrecorder.firebase.project-id}
quarkus.oidc.client-id=${farmrecorder.firebase.project-id}
quarkus.oidc.application-type=service
quarkus.oidc.roles.role-claim-path=role
quarkus.oidc.principal-claim=email

# Firebase Admin SDK Credentials
farmrecorder.firebase.credentials-json=none

# S3 Public Endpoint
farmrecorder.s3.public-endpoint=http://localhost:9000

# OpenSearch
quarkus.opensearch.hosts=http://localhost:9205

# Logging Configuration
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) [%X{correlationId}] %s%e%n
