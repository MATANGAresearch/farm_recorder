# Server Configuration
quarkus.http.port=8082

# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=farmuser
quarkus.datasource.password=farmpass
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/farmrecorder

# Liquibase
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Farm Recorder API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API for GAP-certified farm activity recording and EPCIS traceability
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Panache
quarkus.hibernate-orm.database.generation=validate

# Amazon S3 (MinIO)
quarkus.s3.endpoint-override=http://localhost:9000
quarkus.s3.aws.region=us-east-1
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=minioadmin
quarkus.s3.aws.credentials.static-provider.secret-access-key=minioadmin
quarkus.s3.path-style-access=true

# OIDC Authentication (Keycloak)
quarkus.oidc.auth-server-url=http://localhost:8181/realms/farm-recorder
quarkus.oidc.client-id=farm-recorder-backend
quarkus.oidc.credentials.secret=your-client-secret-here
quarkus.oidc.application-type=service
quarkus.oidc.token-state-manager.split-tokens=true

# OpenSearch
quarkus.opensearch.hosts=http://localhost:9205
