name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
        cache-dependency-path: apps/backend/pom.xml

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Populate Maven Cache
      run: |
        cd apps/backend
        chmod +x mvnw
        ./mvnw dependency:resolve

    - name: Run Trivy Vulnerability Scanner (CVE Check)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        ignore-unfixed: true
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: ACR Login
      run: |
        az acr login --name lumaacr

    - name: Check for Outdated Maven Dependencies
      run: |
        cd apps/backend
        chmod +x mvnw
        ./mvnw versions:display-dependency-updates versions:display-plugin-updates

    - name: Package Backend
      run: |
        cd apps/backend
        chmod +x mvnw
        ./mvnw package -DskipTests

    - name: Build Web Client
      run: |
        cd apps/web
        npm install
        npm run build

    - name: Build & Push Backend Container
      run: |
        docker build -t lumaacr.azurecr.io/farm-recorder-backend:latest -f apps/backend/Dockerfile.fast apps/backend
        docker push lumaacr.azurecr.io/farm-recorder-backend:latest

    - name: Build & Push Frontend Container
      run: |
        docker build -t lumaacr.azurecr.io/farm-recorder-web:latest -f apps/web/Dockerfile.fast apps/web
        docker push lumaacr.azurecr.io/farm-recorder-web:latest

    - name: Set AKS Context
      uses: azure/aks-set-context@v4
      with:
        resource-group: matanga-rg
        cluster-name: matanga-cluster

    - name: Deploy to AKS
      run: |
        kubectl apply -f deploy/backend.yaml -f deploy/frontend.yaml -f deploy/ingress.yaml
        kubectl rollout restart deployment backend frontend -n farmrecorder
        kubectl rollout status deployment backend frontend -n farmrecorder
